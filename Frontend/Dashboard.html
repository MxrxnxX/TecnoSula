<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TecnoSula - Dashboard</title>

    <link rel="stylesheet" href="css/dashboard.css">

</head>


<body>


    <header class="navbar">

        <h1>TecnoSula</h1>

        <button id="cerrarSesion">
            Cerrar sesión
        </button>

    </header>



    <main class="dashboard-container">


        <section class="welcome-card">

            <h2>
                Bienvenido a TecnoSula
            </h2>


            <p>
                Plataforma de gestión inteligente de campañas de marketing.
            </p>


            <div class="user-info">

                <h3>
                    Información del usuario
                </h3>


                <p id="nombreUsuario">
                    Cargando...
                </p>


                <p id="correoUsuario">
                    Cargando...
                </p>


                <p id="rolUsuario">
                    Cargando...
                </p>


            </div>


        </section>



        <section class="modules">


            <div class="module-card">

                <h3>
                    Campañas
                </h3>

                <p>
                    Próximamente podrás gestionar tus campañas.
                </p>

            </div>



            <div class="module-card">

                <h3>
                    Reportes
                </h3>

                <p>
                    Visualiza métricas y resultados.
                </p>

            </div>



            <div class="module-card">

                <h3>
                    Configuración
                </h3>

                <p>
                    Administra tu cuenta.
                </p>

            </div>


        </section>


    </main>



<script src="js/api.js"></script>
<script src="js/dashboard.js"></script>


</body>

</html>
